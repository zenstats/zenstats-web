name: Docker Build

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

      - name: Build & Push
        run: |
          SHA="${GITHUB_SHA:-latest}"
          REF="${GITHUB_REF_NAME:-latest}"
          IMAGE="${{ env.REGISTRY }}/${{ gitea.repository }}"

          TAGS="-t ${IMAGE}:sha-${SHA:0:7} -t ${IMAGE}:${REF}"
          if [ "${{ gitea.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS} -t ${IMAGE}:latest"
          fi

          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            ${TAGS} \
            --push \
            -f Dockerfile .
